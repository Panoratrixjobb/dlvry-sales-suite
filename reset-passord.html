<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nullstill passord — KonseptSuite</title>
<style>
  :root{
    --brand:#3b4cca;--brand2:#5b6ef5;--bg:#f4f5f9;--card:#fff;
    --text:#1a1d2e;--muted:#6b7280;--line:#e5e7eb;--red:#dc2626;--green:#16a34a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--card);border-radius:16px;padding:40px 36px;
    width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,.08)}
  .logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;
    color:var(--brand);margin-bottom:28px}
  .mark{font-size:20px}
  h1{font-size:18px;font-weight:700;margin-bottom:4px}
  .sub{font-size:13px;color:var(--muted);margin-bottom:22px}
  label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:4px}
  input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;
    font-size:13.5px;font-family:inherit;outline:none;transition:.15s;margin-bottom:14px;background:#fff}
  input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,76,202,.12)}
  .btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;
    font-weight:600;cursor:pointer;transition:.15s}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover{background:var(--brand2)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .err{font-size:12.5px;color:var(--red);margin-bottom:12px;min-height:18px}
  .ok{text-align:center;padding:24px 0}
  .ok .ic{font-size:40px;margin-bottom:12px}
  .ok p{font-size:14px;color:var(--muted);margin-bottom:18px}
  #loading{text-align:center;color:var(--muted);font-size:13.5px;padding:24px 0}
  #ugyldig{text-align:center;padding:24px 0}
  #ugyldig .ic{font-size:36px;color:var(--red)}
  #ugyldig p{font-size:13.5px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="mark">◆</span> KonseptSuite</div>

  <div id="loading">Validerer lenke…</div>

  <div id="ugyldig" style="display:none">
    <div class="ic">⚠️</div>
    <h1 style="margin-top:10px">Ugyldig lenke</h1>
    <p id="ugyldigTekst">Lenken er ugyldig, utløpt eller allerede brukt.</p>
    <button class="btn btn-primary" style="margin-top:18px" onclick="location.href='index.html'">Gå til innlogging</button>
  </div>

  <div id="skjema" style="display:none">
    <h1>Sett nytt passord</h1>
    <p class="sub">For <strong id="epostVis"></strong></p>

    <label>Nytt passord * (min. 12 tegn)</label>
    <input id="passord" type="password" placeholder="Velg et sikkert passord" autocomplete="new-password">

    <label>Gjenta passord *</label>
    <input id="passordGjenta" type="password" placeholder="Gjenta passordet" autocomplete="new-password">

    <div class="err" id="skjemaErr"></div>
    <button class="btn btn-primary" id="resetBtn" onclick="settNyttPassord()">Sett nytt passord</button>
  </div>

  <div id="suksess" style="display:none" class="ok">
    <div class="ic">✅</div>
    <h1>Passord satt!</h1>
    <p>Du kan nå logge inn med det nye passordet.</p>
    <button class="btn btn-primary" onclick="location.href='index.html'">Gå til innlogging</button>
  </div>
</div>

<script>
const API_BASE = 'https://app-konseptsuite-dlvry.azurewebsites.net';
const token = new URLSearchParams(location.search).get('token');

async function apiFetch(path, opts={}){
  const r = await fetch(API_BASE+path, {
    method: opts.method||'GET',
    headers: {'Content-Type':'application/json'},
    body: opts.body!=null ? JSON.stringify(opts.body) : undefined,
  });
  if(r.status===204) return null;
  const txt = await r.text();
  let data; try{ data = txt ? JSON.parse(txt) : null; }catch(_){ data=txt; }
  if(!r.ok){
    const msg = (data&&data.detail) ? data.detail : 'HTTP '+r.status;
    throw new Error(typeof msg==='string' ? msg : JSON.stringify(msg));
  }
  return data;
}

async function init(){
  if(!token){
    visFeil('Ingen token funnet i URL-en.');
    return;
  }
  try{
    const info = await apiFetch('/api/passord/reset/'+encodeURIComponent(token));
    document.getElementById('epostVis').textContent = info.epost || '';
    document.getElementById('loading').style.display='none';
    document.getElementById('skjema').style.display='';
  }catch(e){
    visFeil(e.message);
  }
}

function visFeil(tekst){
  document.getElementById('loading').style.display='none';
  document.getElementById('ugyldigTekst').textContent = tekst;
  document.getElementById('ugyldig').style.display='';
}

async function settNyttPassord(){
  const passord = document.getElementById('passord').value;
  const gjenta = document.getElementById('passordGjenta').value;
  const errEl = document.getElementById('skjemaErr');
  errEl.textContent='';

  if(!passord||passord.length<12){ errEl.textContent='Passord må være minst 12 tegn.'; return; }
  if(passord!==gjenta){ errEl.textContent='Passordene er ikke like.'; return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled=true; btn.textContent='Setter nytt passord…';
  try{
    await apiFetch('/api/passord/reset/'+encodeURIComponent(token), {
      method:'POST', body:{nytt_passord:passord}
    });
    document.getElementById('skjema').style.display='none';
    document.getElementById('suksess').style.display='';
    setTimeout(()=>location.href='index.html', 3000);
  }catch(e){
    errEl.textContent = e.message;
    btn.disabled=false; btn.textContent='Sett nytt passord';
  }
}

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('skjema').style.display!=='none') settNyttPassord();
});

init();
</script>
</body>
</html>
